<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>茶与艺的邂逅 - 照片直播间</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.min.css">
    
    <style>
        :root {
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
            --text-main: #333;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
        }

        /* 顶部横幅 */
        .header {
            background: #fff;
            padding: 20px;
            border-bottom: 1px solid #ddd;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 1.2rem;
            margin: 0 0 10px 0;
            color: var(--text-main);
        }

        .header-info {
            font-size: 12px;
            color: #888;
            line-height: 1.6;
        }

        /* 瀑布流容器 */
        .photo-gallery {
            padding: 10px;
            /* 关键：CSS 瀑布流分栏 */
            column-count: 2; /* 默认手机端2列 */
            column-gap: 10px;
        }

        /* 响应式：电脑端显示 4 列 */
        @media (min-width: 768px) {
            .photo-gallery {
                column-count: 4;
                padding: 20px 100px;
            }
        }

        /* 图片卡片样式 */
        .photo-item {
            break-inside: avoid; /* 防止图片被分割到两列 */
            margin-bottom: 10px;
            background: var(--card-bg);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: block;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .photo-item:hover {
            transform: scale(1.02);
        }

        .photo-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 底部操作栏 (模拟) */
        .footer-tools {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>11.27 茶与艺的邂逅</h1>
        <div class="header-info">
            已有 3980 人浏览 · 活动时间: 2025.11.27<br>
            活动地点: 广东 深圳
        </div>
    </header>

    <div class="photo-gallery" id="my-gallery">

        {{range $index, $file := .files}}

        <a href="{{$file.Link}}" 
           data-pswp-width="800" 
           data-pswp-height="1200" 
           target="_blank" class="photo-item">
            <img src="{{$file.Thumb}}" alt="照片1" />
        </a>
         {{end}}

    <div class="footer-tools">
        ▶ 自动播放
    </div>

    <script type="module">
        import PhotoSwipeLightbox from 'https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe-lightbox.esm.min.js';
        
        const lightbox = new PhotoSwipeLightbox({
            gallery: '#my-gallery',
            children: 'a',
            // 插件自带支持手势滑动、缩放
            pswpModule: () => import('https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.esm.min.js')
        });
        
        lightbox.init();
    </script>
